services:
  cache-db:
    image: mongo:7
    container_name: system-cache-db
    restart: unless-stopped
    command: ["mongod", "--auth", "--bind_ip_all"]
    env_file:
      - ./.mongo.env
    volumes:
      - ./data/system-health:/data/db
    ports:
      - "127.0.0.1:${MONGO_LOCAL_PORT:-27018}:27017"

  cache-runtime:
    build:
      context: ./server
    container_name: system-cache-runtime
    restart: unless-stopped
    depends_on:
      - cache-db
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      PORT: 5001
    volumes:
      - ./data/uploads:/app/uploads
    expose:
      - "5001"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:5001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  cache-router:
    build:
      context: ./client
    container_name: system-cache-router
    restart: unless-stopped
    depends_on:
      cache-runtime:
        condition: service_healthy
    ports:
      - "${ROUTER_PORT:-8080}:8080"
